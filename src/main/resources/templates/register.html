<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TEA : REGISTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
        }

        .RegistrationContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registration {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
            padding: 20px;
        }

        .registration h2 {
            text-align: center;
            color: #333;
        }

        .registration label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .registration input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .registration .error {
            color: red;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .registration button {
            background-color: #4caf50;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .registration button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<div class="RegistrationContainer">
    <div class="registration">
        <h2>Register</h2>

        <!-- Bind form to User object -->
        <form th:action="@{/register}" method="post" th:object="${user}">
            <!-- Email -->
            <label for="uemail">Email:</label>
            <input type="email" id="uemail" th:field="*{uemail}" placeholder="Enter email" required>
            <div class="error" th:if="${#fields.hasErrors('uemail')}" th:errors="*{uemail}"></div>

            <!-- Username -->
            <label for="uname">Username:</label>
            <input type="text" id="uname" th:field="*{uname}" placeholder="Enter username" required>
            <div class="error" th:if="${#fields.hasErrors('uname')}" th:errors="*{uname}"></div>

            <!-- Phone Number -->
            <label for="unumber">Phone Number:</label>
            <input type="text" id="unumber" th:field="*{unumber}" placeholder="Enter phone number" required>
            <div class="error" th:if="${#fields.hasErrors('unumber')}" th:errors="*{unumber}"></div>

            <!-- Password -->
            <label for="upassword">Password:</label>
            <input type="password" id="upassword" th:field="*{upassword}" placeholder="Enter password" required>
            <div class="error" th:if="${#fields.hasErrors('upassword')}" th:errors="*{upassword}"></div>

            <!-- Submit Button -->
            <button type="submit">Register</button>
        </form>

    </div>
</div>
</body>
</html>
